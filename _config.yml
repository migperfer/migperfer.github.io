# Site
title:              Miguel Perez
bio:                'Hi! I'm Miguel, a Ph.D. student at the Pompeu Fabra University in collaboration with Huawei'
description:        "My areas of interests are music transcription, digital signal processing and AI applied to music creativity. Although I'm always happy to know what other people in MIR are doing."
reading_time:       true
words_per_minute:   200
logo:               'assets/img/logo.png'
background:         'assets/img/placeholder-big.jpg'
